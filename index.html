<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Book</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
}

.book {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.book img {
  width: 250px;
  border-radius: 10px;
}

.details {
  flex: 1;
}

.price {
  font-size: 22px;
  color: green;
  margin: 10px 0;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #333;
}

.payment {
  background: #fff3cd;
  padding: 10px;
  border-radius: 5px;
  margin: 15px 0;
}
</style>

</head>
<body>

<div class="container">

<div class="card">

<h1>Buy My Book</h1>

<div class="book">
  <img src="https://via.placeholder.com/250" alt="Book">

  <div class="details">
    <h2>Your Book Title</h2>
    <p>This is a short description of your book.</p>
    <div class="price">Rs. 500</div>

    <div class="payment">
      <b>Payment Method:</b><br>
      Easypaisa / JazzCash: 03XXXXXXXXX<br>
      Send payment and upload screenshot below
    </div>

    <form action="https://formsubmit.co/fizzashoaib13@gmail.com" method="POST" enctype="multipart/form-data">

      <input type="hidden" name="_captcha" value="false">

      <label>Quantity</label>
      <input type="number" name="quantity" min="1" required>

      <label>Name</label>
      <input type="text" name="name" required>

      <label>Address</label>
      <textarea name="address" required></textarea>

      <label>Phone Number</label>
      <input type="text" name="phone" required>

      <label>Payment Screenshot</label>
      <input type="file" name="attachment" required>

      <button type="submit">Place Order</button>

    </form>

  </div>
</div>

</div>
</div>

</body>
</html>
